<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Captura</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<nav>
    <strong>MotoControl v2</strong>

    <div>
        <a href="index.html">Dashboard</a>
        <a href="graficas.html">Gráficas</a>
        <a href="captura.html">Captura</a>
    </div>
</nav>

<form id="formCaptura" class="card formulario">

<h2>Registrar Venta</h2>

<input type="text" id="sku" placeholder="SKU" required>

<input type="text" id="cliente" placeholder="Cliente" required>

<select id="marca">
    <option value="Italika">Italika</option>
    <option value="Honda">Honda</option>
    <option value="Vento">Vento</option>
    <option value="Yamaha">Yamaha</option>
</select>

<input type="text" id="cilindraje" placeholder="Cilindraje" required>

<select id="segmento">
    <option value="Ciudad">Ciudad</option>
    <option value="Deportiva">Deportiva</option>
    <option value="Trabajo">Trabajo</option>
</select>

<input type="number" id="costo" placeholder="Costo con IVA" required>

<select id="tipoVenta">
    <option value="Contado">Contado</option>
    <option value="Credito">Credito</option>
</select>

<select id="seguro">
    <option value="Sin">Sin seguro</option>
    <option value="Plus">Seguro Plus</option>
</select>

<input type="date" id="fecha" required>

<button type="submit">
Guardar Venta
</button>

</form>

<script src="js/main.js"></script>

</body>
</html>
